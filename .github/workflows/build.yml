name: build
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: show xcode version
        run: xcodebuild -version

      - name: build
        run: |
          chmod +x scripts/build_ipa.sh
          LARA_LDID_SIGN=0 ./scripts/build_ipa.sh

      - name: upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lara-ipa
          path: |
            dist/lara.ipa
            build/xcodebuild.log

      - name: create release tag
        if: github.event_name != 'pull_request'
        id: tag
        run: |
          TAG="build_$(date +'%Y%m%d%H%M%S')-$(git rev-parse --short HEAD)"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: get last 12h commits
        if: github.event_name != 'pull_request'
        id: commits
        run: |
          COMMITS=$(git log --since="12 hours ago" --pretty=format:"- %h %s (%an)")
          # Use fallback text if no commits
          if [ -z "$COMMITS" ]; then
            COMMITS="No commits in the last 12 hours"
          fi
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: delete old release
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const latestRelease = releases.data.find(r => r.tag_name === 'latest');
            if (latestRelease) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: latestRelease.id
              });
            }

      - name: create new release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: ${{ env.COMMITS }}
          files: dist/lara.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
